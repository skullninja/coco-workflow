# coco-workflow default configuration
# Copy to .coco/config.yaml in your project and customize.

project:
  name: "My Project"
  specs_dir: "specs"                   # Where spec directories live (relative to repo root)

discovery:
  prd_path: "docs/prd.md"             # Product Requirements Document location
  analysis_dir: "docs/analysis"        # Analysis documents directory
  roadmap_dir: "docs/roadmap"          # Per-release roadmap documents directory

issue_tracker:
  provider: "none"                     # linear | github | none

  # Linear configuration (when provider: linear)
  linear:
    team: ""                           # Linear team name
    initiative: ""                     # Optional initiative to link projects to
    labels:                            # Labels applied to created issues
      - "Spec-Driven"

  # GitHub Issues configuration (when provider: github)
  github:
    repo: ""                           # owner/repo format
    owner: ""                          # GitHub org or user (for gh project commands)
    use_projects: true                 # Use GitHub Projects V2 for status tracking
    labels:
      - "spec-driven"

  # Status mapping: internal tracker status -> issue tracker status
  # With PR workflow: issue moves to in_review at PR creation, completed at PR merge
  status_map:
    pending: "Backlog"
    in_progress: "In Progress"
    in_review: "In Review"
    completed: "Done"

quality:
  # Lint command run after each file edit (empty = disabled)
  # Use {file} as placeholder for the modified file path
  lint_command: ""                     # e.g., "ruff check {file}", "eslint {file}"

  # Type-check command run after each file edit (empty = disabled)
  typecheck_command: ""                # e.g., "mypy {file}", "tsc --noEmit"

  # Automatically run lint --fix when lint fails
  auto_fix: false

commit:
  # Commit message format for issue-linked commits
  # Available placeholders: {description}, {issue_key}
  title_format: "{description}. Completes {issue_key}"

  # Patterns that exempt commits from requiring an issue key
  exempt_patterns:
    - "^docs?:"
    - "^typo:"
    - "^(workflow|config|gitignore|hooks|scripts)"
    - "^merge "
    - "^revert "
    - "^Address review feedback"

pre_commit:
  # File patterns that trigger pre-commit validation agent
  # Project should fill these in (e.g., "**/Views/**", "**/*View.swift")
  ui_patterns: []

  # Build command to run as fail-fast check (empty = skip)
  build_command: ""

  # Environment variable to skip pre-commit checks
  skip_env_var: "COCO_QUICK_COMMIT"

testing:
  # Test runner command (empty = no test runner configured)
  test_command: ""

  # Test timeout in seconds
  test_timeout: 180

loop:
  # Maximum iterations before the loop pauses (safety limit)
  max_iterations: 20

  # Consecutive iterations with no commits before circuit breaker triggers
  no_progress_threshold: 3

  # Pause the loop on task failure (test/build errors)
  # If false, skips the failed task and tries the next one
  pause_on_error: true

  # Worktree-based parallel execution
  parallel:
    enabled: false                     # Enable worktree-based parallel execution
    max_agents: 3                      # Max concurrent task-executor agents

pr:
  # Enable two-tier PR workflow (if false, merges directly as before)
  enabled: true

  # Merge strategy for issue PRs into feature branch
  issue_merge_strategy: "squash"       # squash | merge | rebase

  # Merge strategy for feature PR into main
  feature_merge_strategy: "merge"      # squash | merge | rebase

  # Delete branch after PR merge
  delete_branch_after_merge: true

  # AI code review configuration
  review:
    # Enable AI code review on PRs
    enabled: true

    # Maximum review-fix iterations before leaving PR open for human review
    max_review_iterations: 3

    # Severity levels that block merge (critical = bugs/security, warning = advisory)
    blocking_severities:
      - "critical"

    # File patterns to exclude from review
    exclude_patterns:
      - "*.lock"
      - "*.generated.*"
      - "vendor/**"
      - "node_modules/**"

  # Branch naming conventions
  branch:
    # Prefix for feature branches (e.g., feature/user-auth)
    feature_prefix: "feature"

    # How to name issue branches: issue_key (e.g., AUTH-3) or task_id (e.g., epic-001.3)
    issue_branch_naming: "issue_key"   # issue_key | task_id
